<!-- CSS(cascading style sheet ) : its help to describe how html element are to be displayeed on screen -->
 <!-- types of CSS:
  1. Internal CSS: An internal css style hold css rule for the page in the head section of the html file .
  2. External CSS: An External CSS is a file containing only css syntax 
  3. Inline CSS : In inline CSS allows You to apply unique style to one html element at a time


  SELECTOR : IN css selector are pattern used to select the element you want to style .
   TWO main selector :
   .class : select all element with class use multiple time .
   .id : select the element with id its unique use only one time .

    syntax:
    .Class Name{
    definiton
     }

    .id Name{
    definition
    }

    Css properties:
    1) Width: Give width of the html element in px or %;
    2) Height : Give Height of the html element in px or %;
    3) Backgrounnd - color : Give background color to html element by color name or color code 
    4) Float : Give direction to the html element : left or right
